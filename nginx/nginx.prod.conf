worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob: http: https:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:;" always;
    
    # Cornerstone3D SharedArrayBuffer Requirements (COOP & COEP)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always; # credentialless allows loading third-party resources without CORS if not credentialed, or 'require-corp' with CORS
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    server {
        listen 80;
        server_name localhost;

        # Redirect HTTP to HTTPS in production (configured here as a placeholder for deployment)
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/certs/pacs.crt;
        # ssl_certificate_key /etc/nginx/certs/pacs.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend container
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase client body size for DICOM file uploads
            client_max_body_size 100M;
        }

        # OpenAPI Docs
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_set_header Host $host;
        }
    }
}
